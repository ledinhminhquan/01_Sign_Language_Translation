name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only — no torch/mediapipe)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Compile
        run: python -m compileall -q src/signlang
      - name: Run offline test suite
        env:
          SIGNLANG_ARTIFACTS_DIR: ${{ runner.temp }}/signlang_artifacts
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          MPLBACKEND: "Agg"
        run: python -m pytest -q
      - name: Grade (rubric self-check)
        env:
          SIGNLANG_ARTIFACTS_DIR: ${{ runner.temp }}/signlang_artifacts
        run: python -m signlang.cli grade
