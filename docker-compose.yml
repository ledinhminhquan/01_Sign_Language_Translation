services:
  signlang:
    build: .
    image: signlang:latest
    ports:
      - "8000:8000"
    environment:
      SIGNLANG_ARTIFACTS_DIR: /data/artifacts
      HF_HOME: /data/hf
      SIGNLANG_USE_HF: "0"          # synthetic pose generator by default
    volumes:
      - signlang_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  signlang_data:
